name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v3

    - name: Login en Azure Container Registry
      uses: docker/login-action@v3
      with:
        registry: acrproyectoredes2026.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Construir y publicar imagen Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: acrproyectoredes2026.azurecr.io/proyecto-redes:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v3

    - name: Configurar kubectl
      uses: azure/setup-kubectl@v3

    - name: Configurar kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
        echo "KUBECONFIG=$(pwd)/kubeconfig.yaml" >> $GITHUB_ENV

    - name: Desplegar en Kubernetes
      run: |
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml
        kubectl rollout status deployment/proyecto-redes